<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PCVR-EdTech</title>
<style>
  :root {
    --bg: #0b1020;
    --panel: #121a36;
    --accent: #4ade80;
    --accent-2: #38bdf8;
    --text: #e5e7eb;
    --muted: #94a3b8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(circle at top, #1e293b, var(--bg));
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    text-align: center;
  }
  .wrap { width: 100%; max-width: 560px; }
  h1 { margin: 0 0 .5rem; font-size: 2.25rem; color: var(--accent); }
  .tag { color: var(--muted); margin: 0 0 2rem; font-size: 1rem; }
  .card {
    background: var(--panel);
    border: 1px solid #1f2a4a;
    border-radius: 12px;
    padding: 1.75rem 1.25rem;
    box-shadow: 0 10px 30px rgba(0,0,0,.35);
  }
  .card h2 { margin: 0 0 .5rem; color: var(--accent-2); font-size: 1.15rem; }
  .card p { color: var(--muted); margin: 0 0 1.25rem; font-size: .95rem; }
  .btn {
    display: inline-block;
    background: var(--accent);
    color: #0b1020;
    text-decoration: none;
    font-weight: 700;
    padding: .85rem 1.6rem;
    border-radius: 10px;
    font-size: 1.05rem;
    transition: filter .15s ease, transform .15s ease;
  }
  .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
  footer { margin-top: 2rem; color: var(--muted); font-size: .8rem; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>🎮 PCVR-EdTech</h1>
    <p class="tag">An interactive PCVR educational experience.</p>

    <div class="card">
      <h2>🛡️ Code Raiders</h2>
      <p>Level 1 — Fix the broken code, unlock the next stage.</p>
      <a class="btn" href="./code-raiders/">Play Code Raiders Level 1</a>
    </div>

    <footer>QR → Challenge → Unlock</footer>
  </div>
</body>
</html>
