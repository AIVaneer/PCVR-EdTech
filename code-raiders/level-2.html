<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Code Raiders Level 2</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0b1020, #05070c);
  color: white;
  padding: 20px;
}

.container {
  max-width: 800px;
  margin: auto;
}

h1 {
  color: #4ade80;
  text-align: center;
}

.code-box {
  background: #020617;
  padding: 15px;
  border-radius: 10px;
  margin: 20px 0;
  border: 1px solid #4ade80;
  font-family: monospace;
}

textarea {
  width: 100%;
  height: 120px;
  margin-top: 10px;
  background: #020617;
  color: white;
  border: 2px solid #38bdf8;
  border-radius: 10px;
  padding: 10px;
}

button {
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.run {
  background: #4ade80;
}

.hint-btn {
  background: #38bdf8;
}

.terminal {
  margin-top: 20px;
  padding: 15px;
  background: #020617;
  border-radius: 10px;
  border: 1px solid #333;
}

.success {
  color: #4ade80;
}

.error {
  color: #fb7185;
}

.unlock {
  display: none;
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #4ade80;
}
</style>
</head>

<body>
<div class="container">

<h1>Level 2: Firewall Breach</h1>

<p>The firewall is blocking the PCVR signal. Fix the string.</p>

<div class="code-box">
message = Welcome to PCVR
print(message)
</div>

<textarea id="input"></textarea>

<button class="run" onclick="runCode()">Run Code</button>
<button class="hint-btn" onclick="hint()">Need a hint?</button>

<div id="terminal" class="terminal">
SYSTEM READY...
</div>

<div id="unlock" class="unlock">
<h2 class="success">Mission Complete</h2>
<p>You restored the signal.</p>

<a href="./level-3.html">
<button class="run">Go to Level 3</button>
</a>
</div>

</div>

<script>
function normalize(str) {
  return str.replace(/\s+/g, "").replace(/'/g, '"').toLowerCase();
}

function runCode() {
  const input = normalize(document.getElementById("input").value);
  const correct = normalize('message = "Welcome to PCVR"\nprint(message)');
  const terminal = document.getElementById("terminal");

  if (input === correct) {
    terminal.innerHTML = "✅ CORRECT";
    terminal.className = "terminal success";
    document.getElementById("unlock").style.display = "block";
  } else {
    terminal.innerHTML = "❌ TRY AGAIN";
    terminal.className = "terminal error";
  }
}

function hint() {
  document.getElementById("terminal").innerHTML =
    "Hint: Put the text inside quotes";
}
</script>

</body>
</html>
