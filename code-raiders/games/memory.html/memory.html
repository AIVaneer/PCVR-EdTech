<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ WIZARD FAMILIAR MATCH ✨</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root {
  --neon-cyan:#00f7ff;
  --neon-pink:#ff00cc;
  --neon-yellow:#ffff00;
}

body { font-family:'Press Start 2P',system-ui; }

.neon-text {
  text-shadow:0 0 10px var(--neon-cyan),0 0 20px var(--neon-cyan),0 0 40px var(--neon-pink);
}

.card { perspective:1000px; cursor:pointer; }

.card-inner {
  position:relative;
  width:100%;
  height:100%;
  transition:transform .6s cubic-bezier(.23,1,.32,1);
  transform-style:preserve-3d;
  box-shadow:0 0 20px rgba(0,247,255,.6);
}

.card.flipped .card-inner { transform:rotateY(180deg); }

.card-front,.card-back {
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:3.5rem;
  box-shadow:inset 0 0 20px rgba(255,255,255,.3);
}

.card-front {
  background:linear-gradient(145deg,#1a1a2e,#16213e);
  border:5px solid #00f7ff;
  transform:rotateY(180deg);
}

.card-back {
  background:linear-gradient(145deg,#ff00cc,#00f7ff);
  border:5px solid #ffff00;
  color:white;
}

.board {
  display:grid;
  gap:14px;
  padding:20px;
  background:rgba(0,0,0,.75);
  border-radius:24px;
  box-shadow:0 0 40px #00f7ff,0 0 80px #ff00cc;
}

.score-pop {
  position:absolute;
  font-size:2rem;
  font-weight:bold;
  color:#ffff00;
  animation:scoreFloat 1.4s forwards;
}

@keyframes scoreFloat {
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-120px);opacity:0;}
}

.streak-flame { animation:flame .6s infinite alternate; }

@keyframes flame {
  from{filter:brightness(1);}
  to{filter:brightness(1.6);}
}

/* FIXED MISSING ANIMATION */
@keyframes sparkleAnim {
  0%{opacity:.3;transform:scale(.8);}
  50%{opacity:1;transform:scale(1.2);}
  100%{opacity:.3;transform:scale(.8);}
}
</style>
</head>

<body class="bg-gradient-to-br from-[#0a0a2a] to-[#1a0033] text-white min-h-screen overflow-hidden relative">

<div id="bg-particles" class="absolute inset-0 pointer-events-none"></div>

<!-- MENU -->
<div id="menu-screen" class="flex flex-col items-center justify-center min-h-screen p-8">
<h1 class="text-7xl neon-text mb-6">🧙‍♂️ WIZARD MATCH 🐶</h1>

<button onclick="showOptions()" class="px-16 py-8 text-4xl bg-black border-8 border-yellow-400 rounded-3xl hover:scale-110">
START
</button>
</div>

<!-- OPTIONS -->
<div id="options-screen" class="hidden fixed inset-0 bg-black flex items-center justify-center">
<div class="bg-black border-4 border-yellow-400 p-8 text-center">

<h2 class="text-3xl mb-6">SELECT DIFFICULTY</h2>

<button onclick="selectDifficulty(4)">EASY</button>
<button onclick="selectDifficulty(6)">MEDIUM</button>
<button onclick="selectDifficulty(8)">HARD</button>

<br><br>

<button onclick="startSelectedGame()">START</button>

</div>
</div>

<!-- GAME -->
<div id="game-screen" class="hidden flex-col min-h-screen">

<div class="flex justify-between p-6 bg-black">
<div id="timer">00:00</div>
<div id="score">00000</div>
<div id="streak">×1</div>
<div id="hintBtn">HINT (3)</div>
</div>

<div class="flex-1 flex justify-center items-center">
<div id="game-board" class="board w-full max-w-4xl"></div>
</div>

</div>

<script>
let audioContext;
let currentScore=0,streak=1,hintsLeft=3;
let currentDifficulty=4,currentGridCols=4;
let cards=[],flippedCards=[],matchedPairs=0,totalPairs=0,seconds=0,timerInterval;

const emojis=['🧙‍♂️','🐶','🪄','⭐','⚡','🌟','🔥','🧪','🛡️','🐉','💫','🌙','🦄','🧚','🍄','🏰'];

function initAudio(){
  if(!audioContext) audioContext=new(window.AudioContext||window.webkitAudioContext)();
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function createCards(size){
  const pairs=(size*size)/2;
  let deck=[];
  const selected=emojis.slice(0,pairs);
  selected.forEach(e=>{deck.push(e);deck.push(e);});
  return shuffle(deck);
}

function renderBoard(size){
  const board=document.getElementById("game-board");
  board.innerHTML="";
  board.style.gridTemplateColumns=`repeat(${size},1fr)`;

  const deck=createCards(size);
  totalPairs=deck.length/2;
  matchedPairs=0;streak=1;currentScore=0;seconds=0;hintsLeft=3;

  document.getElementById("score").textContent="00000";
  document.getElementById("streak").textContent="×1";
  document.getElementById("hintBtn").textContent="HINT (3)";

  cards=[];flippedCards=[];

  deck.forEach((emoji,i)=>{
    const div=document.createElement("div");
    div.className="card aspect-square";
    div.dataset.index=i;
    div.innerHTML=`
      <div class="card-inner">
        <div class="card-back">🪄</div>
        <div class="card-front">${emoji}</div>
      </div>`;
    div.onclick=()=>handleCardClick(div);
    board.appendChild(div);
    cards.push({emoji,matched:false,element:div});
  });

  clearInterval(timerInterval);
}

function handleCardClick(el){
  const index=el.dataset.index;
  const card=cards[index];

  if(card.matched||flippedCards.length===2||el.classList.contains("flipped"))return;

  initAudio();
  el.classList.add("flipped");
  flippedCards.push(card);

  if(!timerInterval){
    timerInterval=setInterval(()=>{
      seconds++;
      const m=Math.floor(seconds/60);
      const s=seconds%60;
      document.getElementById("timer").textContent=
        `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    },1000);
  }

  if(flippedCards.length===2){
    const [a,b]=flippedCards;

    if(a.emoji===b.emoji){
      a.matched=b.matched=true;
      matchedPairs++;
      streak++;

      const pts=200*streak;
      currentScore+=pts;

      document.getElementById("score").textContent=currentScore;
      document.getElementById("streak").textContent="×"+streak;

      flippedCards=[];
      if(matchedPairs===totalPairs)endGame();
    } else {
      setTimeout(()=>{
        a.element.classList.remove("flipped");
        b.element.classList.remove("flipped");
        flippedCards=[];
        streak=1;
        document.getElementById("streak").textContent="×1";
      },800);
    }
  }
}

function endGame(){
  clearInterval(timerInterval);
  alert("VICTORY!");
  returnToMenu();
}

function useHint(){
  if(hintsLeft<=0)return;
  hintsLeft--;
  document.getElementById("hintBtn").textContent="HINT ("+hintsLeft+")";
}

function selectDifficulty(size){
  currentDifficulty=size;
}

function showOptions(){
  document.getElementById("menu-screen").classList.add("hidden");
  document.getElementById("options-screen").classList.remove("hidden");
}

function startSelectedGame(){
  document.getElementById("options-screen").classList.add("hidden");
  document.getElementById("game-screen").classList.remove("hidden");
  renderBoard(currentDifficulty);
}

function returnToMenu(){
  document.getElementById("game-screen").classList.add("hidden");
  document.getElementById("menu-screen").classList.remove("hidden");
}

function createParticles(){
  const c=document.getElementById("bg-particles");
  for(let i=0;i<50;i++){
    const s=document.createElement("div");
    s.textContent="✨";
    s.style.position="absolute";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    s.style.animation=`sparkleAnim ${2+Math.random()*3}s infinite`;
    c.appendChild(s);
  }
}

window.onload=()=>{
  createParticles();
};
</script>

</body>
</html>
