<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PCVR Arcade</title>

<style>
:root {
  --bg: #05070c;
  --green: #4ade80;
  --cyan: #38bdf8;
  --gold: #facc15;
  --text: #e5e7eb;
  --muted: #94a3b8;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(56,189,248,.22), transparent 35%),
    radial-gradient(circle at top right, rgba(74,222,128,.18), transparent 35%),
    linear-gradient(180deg, #0b1020, var(--bg));
  color: var(--text);
  padding: 20px;
}

.wrap {
  max-width: 720px;
  margin: auto;
}

h1 {
  text-align: center;
  color: var(--green);
  font-size: 2.2rem;
}

.subtitle {
  text-align: center;
  color: var(--muted);
  margin-bottom: 24px;
}

.card {
  background: linear-gradient(135deg, rgba(17,25,54,.96), rgba(5,7,12,.96));
  border: 1px solid rgba(56,189,248,.45);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 16px;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.card:hover {
  transform: scale(1.02);
  box-shadow: 0 0 20px rgba(56,189,248,.25);
}

.card h2 {
  margin: 0 0 6px;
  color: var(--cyan);
}

.card p {
  color: var(--muted);
  margin: 0;
}

button {
  margin-top: 12px;
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  background: var(--green);
  color: black;
  transition: transform 0.1s ease, filter 0.1s ease;
}

button:hover {
  transform: scale(1.05);
  filter: brightness(1.1);
}

button:disabled {
  background: #1e293b;
  color: #64748b;
  cursor: not-allowed;
}

.footer {
  text-align: center;
  margin-top: 24px;
  color: var(--muted);
  font-size: 0.85rem;
}
</style>
</head>

<body>

<div class="wrap">

<h1>🎮 PCVR Arcade</h1>
<p class="subtitle">Mini games + interactive experiments</p>

<!-- MEMORY GAME -->
<div class="card">
  <h2>🧠 Memory Match</h2>
  <p>Train your memory with code symbols.</p>

  <!-- ABSOLUTE PATH (FIXES 404 FOREVER) -->
  <a href="/PCVR-EdTech/code-raiders/games/memory.html">
    <button>Play</button>
  </a>
</div>

<!-- CODE RUNNER -->
<div class="card">
  <h2>🚀 Code Runner (Coming Soon)</h2>
  <p>Dodge bugs. Collect tokens. Stay alive.</p>
  <button disabled>Coming Soon</button>
</div>

<!-- FLAPPY -->
<div class="card">
  <h2>🐦 Flappy Logic (Coming Soon)</h2>
  <p>Control logic to survive obstacles.</p>
  <button disabled>Coming Soon</button>
</div>

<!-- BACK -->
<div style="margin-top:20px;">
  <a href="/PCVR-EdTech/code-raiders/portal.html">
    <button>🏠 Back to Portal</button>
  </a>
</div>

<p class="footer">PCVR Arcade • Always for good, never for bad</p>

</div>

</body>
</html>
