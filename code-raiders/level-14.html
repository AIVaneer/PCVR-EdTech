<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Level 14: Awakening Scene</title>

<style>
* {
  box-sizing:border-box;
  user-select:none;
  -webkit-user-select:none;
  -webkit-touch-callout:none;
  -webkit-tap-highlight-color:transparent;
}

body {
  margin:0;
  overflow:hidden;
  background:#02040f;
  font-family:Arial, sans-serif;
  color:white;
}

.scene {
  width:100vw;
  height:100vh;
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 22%, rgba(167,139,250,.28) 0%, transparent 45%),
    radial-gradient(circle at 35% 12%, rgba(224,242,254,.12) 0%, transparent 35%),
    linear-gradient(#0a1428 0%, #020617 58%, #031c14 100%);
  transition:transform 2s ease;
}

.scene.zoom {
  transform:scale(1.09);
}

.stars span {
  position:absolute;
  background:#e0f2fe;
  border-radius:50%;
  animation:twinkle 3.5s infinite alternate;
  box-shadow:0 0 6px #e0f2fe;
}

@keyframes twinkle {
  from { opacity:.3; transform:scale(0.6); }
  to { opacity:1; transform:scale(1.35); }
}

.moon {
  position:absolute;
  top:9%;
  right:14%;
  width:128px;
  height:128px;
  border-radius:50%;
  background:radial-gradient(circle at 42% 38%, #f8fafc 12%, #c4b5fd 38%, #a5b4fc 68%, #64748b);
  box-shadow: 
    0 0 60px #c4b5fd,
    0 0 110px rgba(196,181,253,.6),
    inset 28px -22px 40px rgba(0,0,0,.45);
  z-index:2;
}

.moon::before {
  content:'';
  position:absolute;
  top:22%;
  left:28%;
  width:26px;
  height:26px;
  background:rgba(255,255,255,.25);
  border-radius:50%;
  box-shadow:0 0 12px #fff;
}

.moon::after {
  content:'';
  position:absolute;
  bottom:32%;
  right:26%;
  width:34px;
  height:18px;
  background:rgba(0,0,0,.2);
  border-radius:50%;
}

.ground {
  position:absolute;
  bottom:0;
  width:100%;
  height:98px;
  background:
    repeating-linear-gradient(92deg, #064e3b 0 32px, #022c22 32px 64px);
  border-top:6px solid #4ade80;
  box-shadow:0 -22px 55px rgba(74,222,128,.25);
  z-index:3;
}

.ruin {
  position:absolute;
  bottom:98px;
  width:58px;
  height:198px;
  background:linear-gradient(#475569 10%, #1e293b);
  border:4px solid #94a3b8;
  opacity:.82;
  box-shadow:0 10px 20px rgba(0,0,0,.6);
}

.ruin.one { left:9%; height:152px; width:48px; }
.ruin.two { right:11%; height:192px; }
.ruin.three { left:47%; height:128px; width:44px; }

.hero {
  position:absolute;
  bottom:162px;
  left:-160px;
  font-size:108px;
  z-index:6;
  filter:drop-shadow(0 8px 18px #38bdf8);
  transform:scaleX(-1);
}

.hero.run {
  animation:runBounce .38s infinite alternate;
}

@keyframes runBounce {
  from { transform:scaleX(-1) translateY(0) rotate(-5deg); }
  to { transform:scaleX(-1) translateY(-22px) rotate(5deg); }
}

.alien {
  position:absolute;
  bottom:172px;
  right:-160px;
  font-size:108px;
  opacity:0;
  z-index:6;
  filter:drop-shadow(0 8px 25px #a78bfa);
}

.beam {
  position:absolute;
  height:14px;
  width:0;
  background:linear-gradient(90deg,#a78bfa,#67e8f9,#e0f2fe);
  box-shadow:0 0 48px #67e8f9;
  top:51%;
  right:26%;
  transform:rotate(-7deg);
  opacity:0;
  z-index:5;
}

.portal {
  position:absolute;
  left:50%;
  top:16%;
  transform:translateX(-50%);
  width:188px;
  height:188px;
  border:8px solid #a78bfa;
  border-radius:50%;
  box-shadow:0 0 55px #a78bfa, inset 0 0 40px rgba(167,139,250,.4);
  opacity:.88;
  animation:pulse 2.8s infinite;
}

@keyframes pulse {
  0%   { transform:translateX(-50%) scale(1); }
  50%  { transform:translateX(-50%) scale(1.12); }
  100% { transform:translateX(-50%) scale(1); }
}

.flash {
  position:fixed;
  inset:0;
  background:white;
  opacity:0;
  pointer-events:none;
  z-index:30;
}

.burst {
  position:absolute;
  left:50%;
  bottom:212px;
  transform:translateX(-50%) scale(0);
  width:260px;
  height:260px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(250,204,21,.98), rgba(103,232,249,.75), transparent 72%);
  opacity:0;
  z-index:7;
}

.burst.active {
  animation:animeBurst 1.8s ease forwards;
}

@keyframes animeBurst {
  0%   { opacity:0; transform:translateX(-50%) scale(.08); }
  28%  { opacity:1; transform:translateX(-50%) scale(1.35); }
  65%  { opacity:.9; transform:translateX(-50%) scale(2.1); }
  100% { opacity:0; transform:translateX(-50%) scale(3.1); }
}

.ring {
  position:absolute;
  left:50%;
  bottom:228px;
  width:72px;
  height:72px;
  border:5px solid #facc15;
  border-radius:50%;
  transform:translateX(-50%) scale(0);
  opacity:0;
  z-index:8;
}

.ring.active {
  animation:ringBlast 1.6s ease forwards;
}

@keyframes ringBlast {
  0%   { opacity:1; transform:translateX(-50%) scale(.15); }
  100% { opacity:0; transform:translateX(-50%) scale(6.5); }
}

.dust {
  position:absolute;
  bottom:118px;
  width:11px;
  height:11px;
  border-radius:50%;
  background:#94a3b8;
  opacity:0;
  z-index:4;
}

.dust.active {
  animation:dustPop 1.2s ease forwards;
}

@keyframes dustPop {
  0%   { opacity:.85; transform:translateX(0) scale(1); }
  100% { opacity:0; transform:translateX(-125px) translateY(-32px) scale(3.2); }
}

.speed-line {
  position:absolute;
  width:130px;
  height:4px;
  background:linear-gradient(90deg, transparent, #bae6fd, #67e8f9);
  opacity:0;
  z-index:3;
}

.speed-line.active {
  animation:speedLine .95s ease forwards;
}

@keyframes speedLine {
  0%   { opacity:0; transform:translateX(0); }
  35%  { opacity:1; }
  100% { opacity:0; transform:translateX(-260px); }
}

.super {
  animation:superGlow 1s infinite alternate;
}

@keyframes superGlow {
  from { filter:drop-shadow(0 0 25px #22d3ee) drop-shadow(0 0 40px #38bdf8); }
  to   { filter:drop-shadow(0 0 60px #facc15) drop-shadow(0 0 95px #a78bfa); }
}

.shake {
  animation:shake .6s linear;
}

@keyframes shake {
  0% { transform:translateX(0); }
  20% { transform:translateX(-14px); }
  40% { transform:translateX(14px); }
  60% { transform:translateX(-9px); }
  80% { transform:translateX(9px); }
  100% { transform:translateX(0); }
}

.dialogue {
  position:absolute;
  left:50%;
  bottom:20px;
  transform:translateX(-50%);
  width:92%;
  max-width:680px;
  background:rgba(2,6,23,.94);
  border:3px solid #a78bfa;
  border-radius:22px;
  padding:20px;
  text-align:center;
  font-size:1.15rem;
  line-height:1.5;
  z-index:40;
  box-shadow:0 0 40px rgba(167,139,250,.5);
}

.title {
  color:#facc15;
  font-weight:900;
  font-size:1.4rem;
  margin-bottom:10px;
  text-shadow:0 0 12px #facc15;
}

button {
  border:0;
  border-radius:16px;
  padding:15px 22px;
  margin:8px;
  font-weight:900;
  font-size:1.05rem;
  cursor:pointer;
}

.play { background:#facc15; color:#422006; }
.next { background:#a78bfa; color:#1e1b4b; }
.home { background:#bae6fd; color:#075985; }
</style>
</head>

<body>

<div class="scene" id="scene">
  <div class="stars" id="stars"></div>
  <div class="moon"></div>
  <div class="portal"></div>

  <div class="ruin one"></div>
  <div class="ruin two"></div>
  <div class="ruin three"></div>

  <div class="burst" id="burst"></div>
  <div class="ring" id="ring"></div>

  <div class="hero" id="hero">🏃‍♂️</div>
  <div class="alien" id="alien">👾</div>
  <div class="beam" id="beam"></div>
  <div class="ground"></div>
  <div class="flash" id="flash"></div>

  <div class="dialogue">
    <div class="title">🎬 Level 14: The Awakening</div>
    <div id="text">The ruins are quiet. Something is watching.</div>
    <div id="buttons">
      <button class="play" onclick="startScene()">▶️ Play Cinematic</button>
      <button class="home" onclick="location.href='./portal.html'">🏠 Portal</button>
    </div>
  </div>
</div>

<script>
let audioCtx;
let musicTimer = null;
let musicStep = 0;
let sceneStarted = false;
let dustTimer = null;

const scene = document.getElementById("scene");
const hero = document.getElementById("hero");
const alien = document.getElementById("alien");
const beam = document.getElementById("beam");
const flash = document.getElementById("flash");
const burst = document.getElementById("burst");
const ring = document.getElementById("ring");
const text = document.getElementById("text");
const buttons = document.getElementById("buttons");

// More stars
for (let i = 0; i < 130; i++) {
  const s = document.createElement("span");
  const size = Math.random() * 3.5 + 1.2;
  s.style.left = Math.random() * 100 + "%";
  s.style.top = Math.random() * 72 + "%";
  s.style.width = size + "px";
  s.style.height = size + "px";
  s.style.animationDelay = Math.random() * 4 + "s";
  s.style.opacity = Math.random() * 0.7 + 0.4;
  document.getElementById("stars").appendChild(s);
}

function unlockAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
}

function tone(freq, dur, type, vol) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || "sine";
  o.frequency.value = freq;
  g.gain.value = vol || .08;
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + dur);
  o.stop(audioCtx.currentTime + dur);
}

function startWizardMusic() {
  if (musicTimer) return;
  const melody = [392, 523, 587, 659, 587, 523, 440, 392];
  const bass = [98, 130, 146, 164];
  musicTimer = setInterval(() => {
    tone(bass[musicStep % bass.length], .22, "triangle", .045);
    if (musicStep % 2 === 0) tone(melody[musicStep % melody.length], .18, "sine", .055);
    if (musicStep % 4 === 0) tone(melody[(musicStep + 2) % melody.length] * 2, .10, "triangle", .035);
    musicStep++;
  }, 280);
}

function zapSound() {
  tone(120, .25, "sawtooth", .15);
  setTimeout(() => tone(600, .16, "square", .12), 110);
  setTimeout(() => tone(980, .22, "triangle", .10), 220);
}

function transformSound() {
  [330, 440, 554, 659, 880, 1046, 1318].forEach((n, i) => {
    setTimeout(() => tone(n, .20, "sine", .13), i * 130);
  });
}

function boomSound() {
  tone(80, .45, "sawtooth", .18);
  setTimeout(() => tone(180, .25, "square", .14), 150);
  setTimeout(() => tone(720, .28, "triangle", .12), 320);
}

function spawnDust(x) {
  const d = document.createElement("div");
  d.className = "dust active";
  d.style.left = x + "px";
  scene.appendChild(d);
  setTimeout(() => d.remove(), 1200);
}

function spawnSpeedLine(x) {
  const l = document.createElement("div");
  l.className = "speed-line active";
  l.style.left = x + 35 + "px";
  l.style.top = "54%";
  scene.appendChild(l);
  setTimeout(() => l.remove(), 950);
}

function startScene() {
  if (sceneStarted) return;
  sceneStarted = true;

  unlockAudio();
  startWizardMusic();

  buttons.innerHTML = "";
  text.textContent = "The hero runs toward the Sky Temple signal...";
  hero.classList.add("run");

  let x = -160;
  let frame = 0;
  const runFrames = ["🏃‍♂️", "🏃", "🏃‍♂️"];

  dustTimer = setInterval(() => {
    spawnDust(x + 48);
    spawnSpeedLine(x);
  }, 260);

  const run = setInterval(() => {
    x += 5.8;
    frame++;
    hero.style.left = x + "px";
    hero.textContent = runFrames[frame % runFrames.length];

    if (x > window.innerWidth * 0.39) {
      clearInterval(run);
      clearInterval(dustTimer);
      hero.classList.remove("run");
      hero.textContent = "🧍‍♂️";
      setTimeout(spawnAlien, 1100);
    }
  }, 98);
}

function spawnAlien() {
  text.textContent = "A strange alien guardian descends from the dark...";
  alien.style.opacity = 1;
  scene.classList.add("zoom");

  let r = -160;
  const move = setInterval(() => {
    r += 5.4;
    alien.style.right = r + "px";

    if (r > window.innerWidth * 0.23) {
      clearInterval(move);
      setTimeout(zapHero, 1250);
    }
  }, 58);
}

function zapHero() {
  text.textContent = "⚡ The guardian fires a cosmic charge!";
  zapSound();

  beam.style.opacity = 1;
  beam.style.width = "60vw";

  scene.classList.add("shake");
  flash.style.opacity = 1;

  setTimeout(() => {
    flash.style.opacity = 0;
    scene.classList.remove("shake");
  }, 320);

  setTimeout(transformHero, 1480);
}

function transformHero() {
  text.textContent = "The energy does not destroy him... it awakens him.";
  transformSound();

  hero.textContent = "🧙‍♂️";
  hero.classList.add("super");
  beam.style.opacity = 0;

  burst.classList.add("active");
  ring.classList.add("active");
  boomSound();

  scene.classList.add("shake");
  flash.style.opacity = 1;

  setTimeout(() => {
    flash.style.opacity = 0;
    scene.classList.remove("shake");
  }, 380);

  setTimeout(finalScene, 2800);
}

function finalScene() {
  text.innerHTML = "✨ SUPERHUMAN MODE UNLOCKED ✨<br>PCVR can now build games, lessons, and cinematic scenes.";

  if (localStorage.getItem("pcvr_level14_rewarded") !== "true") {
    const xp = parseInt(localStorage.getItem("pcvr_xp") || "0", 10) + 80;
    localStorage.setItem("pcvr_xp", String(xp));
    localStorage.setItem("pcvr_level14_rewarded", "true");
  }

  localStorage.setItem("pcvr_level14_complete", "true");
  localStorage.setItem("pcvr_world4_progress", "true");

  buttons.innerHTML = `
    <button class="next" onclick="location.href='./level-15.html'">➡️ Continue to Level 15</button>
    <button class="home" onclick="location.href='./portal.html'">🏠 Portal</button>
    <button class="play" onclick="location.reload()">🔁 Replay Scene</button>
  `;
}
</script>
</body>
</html>
