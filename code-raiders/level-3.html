<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Level 3: Loop Gate</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0b1020, #05070c);
  color: white;
  padding: 20px;
}

.container {
  max-width: 800px;
  margin: auto;
}

h1 {
  text-align: center;
  color: #4ade80;
}

.code-box {
  background: #020617;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #4ade80;
  margin: 20px 0;
  font-family: monospace;
  white-space: pre;
}

textarea {
  width: 100%;
  height: 120px;
  margin-top: 10px;
  background: #020617;
  color: white;
  border: 2px solid #38bdf8;
  border-radius: 10px;
  padding: 10px;
  font-family: monospace;
}

button {
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.run {
  background: #4ade80;
}

.hint-btn {
  background: #38bdf8;
}

.terminal {
  margin-top: 20px;
  padding: 15px;
  background: #020617;
  border-radius: 10px;
  border: 1px solid #333;
  font-family: monospace;
}

.success {
  color: #4ade80;
}

.error {
  color: #fb7185;
}

.unlock {
  display: none;
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #4ade80;
}
</style>
</head>

<body>
<div class="container">

<h1>Level 3: Loop Gate</h1>
<p>The system is stuck in a loop. Fix it to stabilize the PCVR signal.</p>

<div class="code-box">for i in range(3)
    print("PCVR")</div>

<textarea id="input" placeholder="Type the corrected code here"></textarea>

<button class="run" onclick="runCode()">Run Code</button>
<button class="hint-btn" onclick="showHint()">Need a hint?</button>

<div id="terminal" class="terminal">SYSTEM READY...</div>

<div id="unlock" class="unlock">
  <h2 class="success">Loop Stabilized</h2>
  <p>You completed the first cycle.</p>
  <p>🔥 World 1 Complete 🔥</p>
  <p>You are ready for the next world.</p>

  <a href="./level-4.html">
    <button class="run">Enter World 2</button>
  </a>
</div>

</div>

<script>
function normalize(s) {
  return s.replace(/\s+/g, "").toLowerCase();
}

function runCode() {
  var input = normalize(document.getElementById("input").value);
  var correct = normalize('for i in range(3): print("PCVR")');
  var terminal = document.getElementById("terminal");

  if (input === correct) {

    // 🔥 THIS IS THE KEY LINE (UNLOCK FLAG)
    localStorage.setItem("pcvr_world1_complete", "true");

    terminal.innerHTML = "✅ CORRECT";
    terminal.className = "terminal success";
    document.getElementById("unlock").style.display = "block";

  } else {
    terminal.innerHTML = "❌ TRY AGAIN";
    terminal.className = "terminal error";
  }
}

function showHint() {
  document.getElementById("terminal").innerHTML =
    "Hint: Add a colon (:) at the end of the for loop.";
}
</script>

</body>
</html>
