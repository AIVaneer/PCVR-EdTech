<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Level 13: Power Gate</title>

<style>
* {
  box-sizing:border-box;
  user-select:none;
  touch-action:manipulation;
}

body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(#0f172a,#020617);
  color:white;
  text-align:center;
}

.wrap {
  max-width:700px;
  margin:auto;
  padding:20px;
}

h1 { color:#a78bfa; }

.prompt {
  font-size:2rem;
  margin:20px 0;
}

.bar {
  height:32px;
  background:#111;
  border:2px solid #a78bfa;
  margin:12px 0;
}

.fill {
  height:100%;
  width:0%;
  background:#22c55e;
}

.enemy {
  background:#ef4444;
}

.controls {
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

button {
  flex:1;
  max-width:200px;
  padding:18px;
  font-size:1.2rem;
  border:none;
  border-radius:14px;
  font-weight:bold;
}

.left { background:#22c55e; color:black; }
.right { background:#60a5fa; color:black; }

.portal { background:#facc15; }

.overlay {
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.9);
}

.box {
  background:#020617;
  padding:30px;
  border-radius:20px;
  border:3px solid #a78bfa;
}
</style>
</head>

<body>

<div class="wrap">

<h1>Level 13: Power Gate</h1>
<p>Follow the pattern faster than the enemy!</p>

<div class="prompt" id="prompt">LEFT</div>

<div class="bar"><div id="playerBar" class="fill"></div></div>
<div class="bar"><div id="enemyBar" class="fill enemy"></div></div>

<div class="controls">
  <button class="left" onclick="press('left')">⬅️ LEFT</button>
  <button class="right" onclick="press('right')">➡️ RIGHT</button>
</div>

<button class="portal" onclick="location.href='./portal.html'">🏠 Portal</button>

</div>

<div id="overlay" class="overlay">
  <div class="box">
    <h2 id="result"></h2>
    <p id="scoreText"></p>
    <button onclick="location.href='./level-14.html'">➡️ Next Mission</button>
    <button onclick="location.href='./portal.html'">🏠 Portal</button>
    <button onclick="restart()">🔁 Retry</button>
  </div>
</div>

<script>
let player = 0;
let enemy = 0;
let running = true;

let current = "left";

function nextPrompt(){
  current = Math.random() > 0.5 ? "left" : "right";
  document.getElementById("prompt").innerText = current.toUpperCase();
}

function press(dir){
  if(!running) return;

  if(dir === current){
    player += 6;
  } else {
    player -= 4;
    if(player < 0) player = 0;
  }

  updateBars();
  nextPrompt();
}

function updateBars(){
  if(player > 100) player = 100;
  if(enemy > 100) enemy = 100;

  document.getElementById("playerBar").style.width = player + "%";
  document.getElementById("enemyBar").style.width = enemy + "%";
}

function enemyAI(){
  if(!running) return;

  enemy += Math.random() * 2;
  updateBars();

  if(player >= 100 || enemy >= 100){
    endGame();
  }
}

setInterval(enemyAI,120);

function endGame(){
  running = false;

  let win = player > enemy;

  if(win){
    document.getElementById("result").innerText = "🏆 Gate Destroyed!";
    
    let xp = parseInt(localStorage.getItem("pcvr_xp")||"0");
    xp += 120;
    localStorage.setItem("pcvr_xp",xp);

    document.getElementById("scoreText").innerText = "+120 XP | Total XP: " + xp;
  } else {
    document.getElementById("result").innerText = "💥 Failed!";
    document.getElementById("scoreText").innerText = "Wrong timing!";
  }

  document.getElementById("overlay").style.display = "flex";
}

function restart(){
  location.reload();
}

nextPrompt();
</script>

</body>
</html>
